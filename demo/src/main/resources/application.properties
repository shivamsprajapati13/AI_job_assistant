spring.application.name=job-application-assistant

# Server
server.port=8600

# MySQL Database (set MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD in .env)
spring.datasource.url=${MYSQL_URL:}
spring.datasource.username=${MYSQL_USER:}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Providers (Strategy pattern - users can choose per request or in profile)
ai.default-provider=gemini

ai.providers.openai.enabled=false
ai.providers.openai.api-key=${OPENAI_API_KEY:}
ai.providers.openai.model=gpt-4o

ai.providers.gemini.enabled=true
ai.providers.gemini.api-key=${GEMINI_API_KEY:}
ai.providers.gemini.model=gemini-2.5-flash

# Google OAuth2 (Gmail) — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in .env
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/gmail.send
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

# App settings
app.upload.dir=./uploads
app.default-user-email=${DEFAULT_USER_EMAIL:}
